# Keep CI/publish GitHub Actions (SHA-pinned) and the npm toolchain current.
# Actions are pinned to commit SHAs for supply-chain safety; dependabot bumps
# the SHA + the `# vN` comment together when a new release ships.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    # codeql-action/init and codeql-action/analyze must run at the same version
    # or CodeQL fails with a configuration error. Bundle them into one PR so a
    # bump never lands on only one of the pair.
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action*"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
