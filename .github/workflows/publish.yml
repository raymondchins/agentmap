name: Publish

# Tag-triggered release. Push a version tag (e.g. `git tag v0.11.0 && git push
# origin v0.11.0`) and this workflow runs the full test gate, then publishes to
# npm WITH provenance (OIDC-signed supply-chain attestation — only possible from
# CI, never from a local machine), and cuts a GitHub Release.
#
# One-time setup: add an npm *Automation* access token as the repo secret
# NPM_TOKEN (Settings → Secrets and variables → Actions). Automation tokens
# bypass 2FA, which interactive `npm publish` on a local machine cannot.
on:
  push:
    tags:
      - "v*"

# Read-only default; the publish job re-declares the write scopes it needs below.
permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # mint the OIDC token npm provenance requires
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      # Fail fast if the tag and package.json disagree — prevents publishing a
      # version that doesn't match the tag that triggered this run.
      - name: Verify tag matches package.json + server.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          SJ="$(node -p "require('./server.json').version")"
          SJP="$(node -p "require('./server.json').packages[0].version")"
          echo "tag=$TAG package.json=$PKG server.json=$SJ/$SJP"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          if [ "$TAG" != "$SJ" ] || [ "$TAG" != "$SJP" ]; then
            echo "::error::Tag v$TAG does not match server.json version ($SJ / packages[0] $SJP) — bump server.json in lockstep"
            exit 1
          fi

      # Same gate as CI — never publish a red build.
      - name: Run tests
        run: npm test

      - name: Smoke (--hubs on self)
        run: node agentmap.mjs --hubs

      - name: Validate pack manifest
        run: npm pack --dry-run

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes

      # List the stdio MCP server in the official MCP Registry. GitHub OIDC (the
      # id-token: write permission above) authorizes the io.github.raymondchins/*
      # namespace — no secret needed. Runs LAST so a registry hiccup never blocks
      # the npm publish or the GitHub Release.
      - name: Install mcp-publisher
        run: curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Publish to the MCP Registry (GitHub OIDC — no secret)
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish ./server.json
